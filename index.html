<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>跟我写</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workbench" aria-label="跟我写">
        <div class="practice-shell">
          <!-- 田字格/墨迹/空态提示同锚一个容器:画布永远与格子对齐,不受 shell 内边距影响 -->
          <div class="board-wrap">
            <svg id="writingBoard" viewBox="0 0 640 640" role="img" aria-label="汉字田字格">
              <rect class="paper" x="0" y="0" width="640" height="640" rx="18" />
              <path class="grid-line" d="M320 0V640M0 320H640" />
              <path class="grid-dash" d="M0 0L640 640M640 0L0 640" />
            </svg>
            <canvas id="inkCanvas" class="ink-canvas" aria-hidden="true"></canvas>

            <!-- 空态引导:格子里还没字时,页面上唯一可做的事就是按住说话 -->
            <p id="boardHint" class="board-hint">按住绿色按钮<br />说出想写的字</p>

            <!-- 在想:松手到出字之间的思考动画(墨点起伏),孩子不识字,动效即反馈 -->
            <div id="thinkingDots" class="thinking-dots" hidden aria-hidden="true">
              <i></i><i></i><i></i>
            </div>
          </div>

          <!-- 次级动作(再看/再听)只在格子里有字后才出现,空态是死按钮不该展示 -->
          <div id="boardControls" class="board-controls" hidden>
            <div class="control-item">
              <button id="playPauseBtn" class="round-button" type="button" aria-label="再写一遍" title="再写一遍">
                <svg class="icon icon-play" viewBox="0 0 24 24" aria-hidden="true">
                  <polygon points="7.5 4.5 19.5 12 7.5 19.5" fill="currentColor" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round" />
                </svg>
                <svg class="icon icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5.6" y="4.5" width="4.6" height="15" rx="2" fill="currentColor" />
                  <rect x="13.8" y="4.5" width="4.6" height="15" rx="2" fill="currentColor" />
                </svg>
              </button>
              <span class="control-caption">再写一遍</span>
            </div>
            <div class="control-item">
              <button id="speakBtn" class="round-button" type="button" aria-label="再读一遍" title="再读一遍">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M11.2 4.9 7 8.3H4.4c-.8 0-1.4.6-1.4 1.4v4.6c0 .8.6 1.4 1.4 1.4H7l4.2 3.4c.6.5 1.4 0 1.4-.7V5.6c0-.7-.9-1.2-1.4-.7Z" fill="currentColor" />
                  <path d="M15.6 8.7a4.8 4.8 0 0 1 0 6.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <path d="M18.5 5.8a9 9 0 0 1 0 12.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <span class="control-caption">再读一遍</span>
            </div>
          </div>
        </div>

        <button id="micBtn" class="mic-button is-beckoning" type="button" aria-label="按住说“小城夏天的城怎么写”">
          <svg class="icon mic-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="2.5" width="6" height="11.5" rx="3" fill="currentColor" />
            <path d="M5.5 11v.8a6.5 6.5 0 0 0 13 0V11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
            <path d="M12 18.6v3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
          <!-- 在听:声波条跳动(替换麦克风图标),录音中的动效语言 -->
          <span class="wave-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="mic-label">按住说“小城夏天的城怎么写”</span>
        </button>

        <!-- 测试入口:仅 ?test 时显示,绕过语音直接打字查字。小朋友的正式界面不出现。 -->
        <input
          id="testInput"
          class="test-input"
          type="text"
          hidden
          autocomplete="off"
          placeholder="测试:输入要写的字,回车"
          aria-label="测试:输入要写的字"
        />
      </section>
    </main>

    <script type="module" src="dist/app.js"></script>
  </body>
</html>
