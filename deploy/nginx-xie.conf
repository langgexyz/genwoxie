# ccdirect.dev 的 443 server 块里追加的 /xie/ 反代段(参考副本,真身在服务器
# /etc/nginx/sites-enabled/ccdirect)。proxy_pass 结尾斜杠 = 剥掉 /xie/ 前缀,
# 应用自身按根路径工作;client_max_body_size 放宽是因为录音以 base64 JSON 上行。
location = /xie { return 301 /xie/; }
location /xie/ {
    proxy_pass http://127.0.0.1:8850/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 16m;
    proxy_read_timeout 60s;
}
