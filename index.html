<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>跟我写</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workbench" aria-label="跟我写">
        <div class="practice-shell">
          <svg id="writingBoard" viewBox="0 0 640 640" role="img" aria-label="汉字田字格">
            <rect class="paper" x="0" y="0" width="640" height="640" rx="18" />
            <path class="grid-line" d="M320 0V640M0 320H640" />
            <path class="grid-dash" d="M0 0L640 640M640 0L0 640" />
          </svg>
          <canvas id="inkCanvas" class="ink-canvas" aria-hidden="true"></canvas>

          <div class="board-controls">
            <button id="playPauseBtn" class="round-button" type="button" aria-label="播放笔顺" title="播放笔顺">
              <span class="play-glyph" aria-hidden="true"></span>
            </button>
            <button id="speakBtn" class="round-button" type="button" aria-label="读这个字" title="读这个字">
              <span class="speak-glyph" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <button id="micBtn" class="mic-button" type="button" aria-label="按住说要写的字">
          <span class="mic-glyph" aria-hidden="true"></span>
          <span class="mic-label">按住说要写的字</span>
        </button>

        <!-- 测试入口:仅 ?test 时显示,绕过语音直接打字查字。小朋友的正式界面不出现。 -->
        <input
          id="testInput"
          class="test-input"
          type="text"
          hidden
          autocomplete="off"
          placeholder="测试:输入要写的字,回车"
          aria-label="测试:输入要写的字"
        />
      </section>
    </main>

    <script type="module" src="dist/app.js"></script>
  </body>
</html>
